<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Novel — Ohara</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-header">
  <div class="inner">
    <a href="index.html" class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
      </svg>
      Ohara
    </a>
    <nav class="breadcrumb">
      <span class="sep">›</span>
      <span id="bc-title" style="color:var(--ink-dim)">…</span>
    </nav>
  </div>
</header>

<main>
  <div class="container">

    <div id="state-loading" class="state-loading">Loading novel</div>
    <div id="state-error"   class="state-error   hidden"></div>
    <div id="state-empty"   class="state-empty   hidden">Novel not found.</div>
    <div id="content"       class="hidden">

      <!-- Hero -->
      <div class="novel-hero">
        <div class="novel-hero-cover" id="hero-cover"></div>
        <div class="novel-hero-info" id="hero-info">
          <h1 class="novel-hero-title" id="hero-title"></h1>
          <div class="novel-hero-meta" id="hero-meta"></div>
          <div id="btn-area" style="margin-top:20px"></div>
          <div id="offline-area" style="margin-top:14px"></div>
        </div>
      </div>

      <!-- Chapter list -->
      <div class="chapter-list-section">
        <div class="section-title">Chapters</div>
        <div id="list-pagination" class="list-pagination"></div>
        <ul class="chapter-list" id="chapter-list"></ul>
        <div id="list-pagination-bottom" class="list-pagination" style="padding-top:16px"></div>
      </div>

    </div>
  </div>
</main>

<footer class="site-footer">
  <div class="container">Ohara · personal library</div>
</footer>

<script src="app.js"></script>
<script>
  const CHAPTERS_PER_PAGE = 100;
  let meta = null;
  let currentPage = 0;
  const slug = params().get('slug');

  async function init() {
    checkAuth();
    if (!slug) { showState('state-empty'); return; }
    try {
      meta = await loadNovelMeta(slug);
      document.title = `${meta.title} — Ohara`;
      document.getElementById('bc-title').textContent = meta.title;

      // Cover — use blob URL when offline
      const coverEl  = document.getElementById('hero-cover');
      const coverURL = await getCoverURL(slug, meta.cover);
      coverEl.innerHTML = coverURL
        ? `<img src="${esc(coverURL)}" alt="${esc(meta.title)}" onerror="this.parentElement.innerHTML='<span class=cover-fallback>📖</span>'">`
        : `<span class="cover-fallback">📖</span>`;

      document.getElementById('hero-title').textContent = meta.title;
      document.getElementById('hero-meta').innerHTML = `
        <span><strong>${(meta.totalChapters || meta.chapters.length).toLocaleString()}</strong> chapters</span>
        ${meta.lastUpdated ? `<span>Updated <strong>${meta.lastUpdated}</strong></span>` : ''}
        ${meta.source ? `<span><a href="${esc(meta.source)}" target="_blank" rel="noopener" style="color:var(--gold-dim)">Source ↗</a></span>` : ''}
      `;

      // Tags
      if (meta.tags && meta.tags.length) {
        const tagsHTML = meta.tags.map(t => `<span class="tag">${esc(t)}</span>`).join('');
        document.getElementById('hero-meta').insertAdjacentHTML(
          'afterend', `<div class="tags" style="margin-top:12px">${tagsHTML}</div>`
        );
      }

      // Star rating
      const rating = getRating(slug);
      document.getElementById('hero-info').insertAdjacentHTML(
        'beforeend',
        `<div class="stars" id="stars-${esc(slug)}" style="margin-top:14px">
          ${starsHTML(slug, rating)}
        </div>
        <div style="font-size:.75rem;color:var(--ink-faint);margin-top:4px">
          ${rating ? `Your rating: ${rating}/5` : 'Rate this novel'}
        </div>`
      );

      // Continue reading or start
      const progress = getProgress(slug);
      const btnArea  = document.getElementById('btn-area');
      if (progress) {
        btnArea.innerHTML = `
          <a class="btn-start" href="chapter.html?slug=${esc(slug)}&ch=${progress.chapter}">
            Continue — Ch ${progress.chapter}
          </a>
          <button class="btn-continue" onclick="startFromBeginning()" style="margin-left:10px">
            Start over
          </button>`;
      } else if (meta.chapters && meta.chapters.length) {
        const first = meta.chapters[0].num;
        btnArea.innerHTML = `<a class="btn-start" href="chapter.html?slug=${esc(slug)}&ch=${first}">Read Chapter 1</a>`;
      }

      renderPage(0);
      showState('content');
      initOfflineControls();
    } catch (e) {
      document.getElementById('state-error').textContent = 'Could not load novel. ' + e.message;
      showState('state-error');
    }
  }

  // ── Offline save / update / remove ───────────────────────────
  async function initOfflineControls() {
    const offline = await isNovelOffline(slug);
    renderOfflineButton(offline);

    // Auto-sync silently in the background if already saved offline —
    // no need to click "Update" manually anymore.
    if (offline && navigator.onLine) {
      handleOfflineUpdate(true); // silent = true, no "Up to date" flash needed
    }
  }

  function renderOfflineButton(offline) {
    const area = document.getElementById('offline-area');
    if (offline) {
      area.innerHTML = `
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <span class="progress-badge">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M5 13l4 4L19 7"/>
            </svg>
            Saved Offline
          </span>
          <button class="page-btn" onclick="handleOfflineUpdate()">↻ Update</button>
          <button class="page-btn" onclick="handleOfflineRemove()" style="color:var(--ink-faint)">✕ Remove</button>
        </div>
        <div id="offline-progress" style="margin-top:8px;font-size:.78rem;color:var(--ink-faint)"></div>
      `;
    } else {
      area.innerHTML = `
        <button class="btn-continue" onclick="handleOfflineSave()">
          ⬇ Save Offline
        </button>
        <div id="offline-progress" style="margin-top:8px;font-size:.78rem;color:var(--ink-faint)"></div>
      `;
    }
  }

  function offlineProgress(done, total) {
    const el = document.getElementById('offline-progress');
    if (el) el.textContent = `Downloading chapters… ${done.toLocaleString()} / ${total.toLocaleString()}`;
  }

  async function handleOfflineSave() {
    const area = document.getElementById('offline-area');
    area.querySelector('button').disabled = true;
    area.querySelector('button').textContent = 'Saving…';
    try {
      await saveNovelOffline(slug, offlineProgress);
      renderOfflineButton(true);
    } catch (e) {
      document.getElementById('offline-progress').textContent =
        'Could not save offline: ' + e.message;
    }
  }

  async function handleOfflineUpdate(silent) {
    const el = document.getElementById('offline-progress');
    if (el && !silent) el.textContent = 'Checking for new chapters…';
    try {
      await saveNovelOffline(slug, silent ? null : offlineProgress);
      if (el) {
        el.textContent = 'Up to date.';
        setTimeout(() => { if (el) el.textContent = ''; }, 2500);
      }
    } catch (e) {
      if (el && !silent) el.textContent = 'Update failed: ' + e.message;
    }
  }

  async function handleOfflineRemove() {
    if (!confirm('Remove this novel from offline storage? You can save it again anytime.')) return;
    await removeNovelOffline(slug);
    renderOfflineButton(false);
  }

  function startFromBeginning() {
    if (meta && meta.chapters && meta.chapters.length) {
      go('chapter.html', { slug, ch: meta.chapters[0].num });
    }
  }

  function renderPage(page) {
    currentPage = page;
    const chapters = meta.chapters || [];
    const totalPages = Math.ceil(chapters.length / CHAPTERS_PER_PAGE);
    const start = page * CHAPTERS_PER_PAGE;
    const slice = chapters.slice(start, start + CHAPTERS_PER_PAGE);

    // Chapter list
    document.getElementById('chapter-list').innerHTML = slice.map(ch => `
      <li class="chapter-item">
        <a class="chapter-link" href="chapter.html?slug=${esc(slug)}&ch=${ch.num}">
          <span class="chapter-num">${String(ch.num).padStart(4, '0')}</span>
          <span class="chapter-title-text">${esc(ch.title || `Chapter ${ch.num}`)}</span>
        </a>
      </li>
    `).join('');

    // Pagination
    const pagHTML = totalPages > 1
      ? Array.from({length: totalPages}, (_, i) =>
          `<button class="page-btn ${i === page ? 'active' : ''}" onclick="renderPage(${i})">${i + 1}</button>`
        ).join('')
      : '';
    document.getElementById('list-pagination').innerHTML = pagHTML;
    document.getElementById('list-pagination-bottom').innerHTML = pagHTML;
  }

  init();
</script>
</body>
</html>
