<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reading — Ohara</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Reading-specific layout tweaks */
    .chapter-prose { margin-top: 0; }
    #merged-chapters { margin-top: 0; }
    #loading-merge {
      text-align: center;
      padding: 24px;
      color: var(--ink-dim);
      font-size: .85rem;
      display: none;
    }
    #loading-merge.visible { display: block; }
    #loading-merge::after {
      content: '';
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin-left: 8px;
      vertical-align: middle;
    }
    .font-controls {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .font-btn {
      width: 30px; height: 30px;
      border: 1px solid var(--border);
      border-radius: var(--r);
      background: transparent;
      color: var(--ink-dim);
      cursor: pointer;
      font-family: inherit;
      font-size: .9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color .15s, color .15s;
    }
    .font-btn:hover { border-color: var(--gold-dim); color: var(--ink); }
    .nav-col-left  { display: flex; justify-content: flex-start; }
    .nav-col-mid   { display: flex; justify-content: center; }
    .nav-col-right { display: flex; justify-content: flex-end; }
  </style>
</head>
<body>

<header class="site-header">
  <div class="inner">
    <a href="index.html" class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
      </svg>
      Ohara
    </a>
    <nav class="breadcrumb">
      <span class="sep">›</span>
      <a href="#" id="bc-novel" class="breadcrumb-link">…</a>
      <span class="sep">›</span>
      <span id="bc-chapter" style="color:var(--ink-dim)">…</span>
    </nav>
    <div class="header-right font-controls">
      <button id="btn-reader" onclick="openReader()"
         style="padding:5px 11px;border:1px solid var(--border);border-radius:var(--r);
                font-size:.78rem;color:var(--ink-dim);background:transparent;
                font-family:inherit;white-space:nowrap;cursor:pointer;
                transition:color .15s,border-color .15s"
         onmouseover="this.style.color='var(--gold)';this.style.borderColor='var(--gold-dim)'"
         onmouseout="this.style.color='var(--ink-dim)';this.style.borderColor='var(--border)'"
         title="Open clean page for Safari Reader">
        &#9783; Reader
      </button>
      <button class="font-btn" id="font-down" title="Smaller text">A−</button>
      <button class="font-btn" id="font-up"   title="Larger text">A+</button>
    </div>
  </div>
</header>

<div class="reader-header">
  <div class="reader-header-inner">
    <span id="rh-title" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
    <span id="rh-progress" class="reader-progress"></span>
  </div>
</div>

<main>
  <div id="state-loading" class="state-loading" style="padding-top:80px">Loading chapter</div>
  <div id="state-error"   class="state-error hidden" style="padding-top:80px"></div>
  <div id="content"       class="hidden">

    <div class="prose-container">
      <div class="chapter-content-area">
        <div id="merged-chapters"></div>
        <div id="loading-merge"></div>
      </div>

      <div class="chapter-nav">
        <div class="nav-col-left">
          <button class="nav-btn prev" id="btn-prev" disabled>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
            <span><span class="nav-btn-label">Previous</span><span id="prev-label">—</span></span>
          </button>
        </div>
        <div class="nav-col-mid">
          <button class="nav-btn merge" id="btn-merge">
            ⊕ Merge Next 10
          </button>
        </div>
        <div class="nav-col-right">
          <button class="nav-btn next" id="btn-next" disabled>
            <span><span class="nav-btn-label">Next</span><span id="next-label">—</span></span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</main>

<footer class="site-footer">
  <div class="container">Ohara · personal library</div>
</footer>

<script src="app.js"></script>
<script>
  // ── State ────────────────────────────────────────────────────
  const slug       = params().get('slug');
  const startChNum = parseInt(params().get('ch')) || 1;
  let   endChNum   = parseInt(params().get('end')) || startChNum;

  let meta      = null;
  let maxLoadedCh = 0;
  let fontSize  = parseFloat(localStorage.getItem('ohara-font') || '1.08');
  let merging   = false;

  // ── Font size controls ───────────────────────────────────────
  function applyFont() {
    document.querySelectorAll('.chapter-prose').forEach(el => {
      el.style.fontSize = fontSize + 'rem';
    });
    localStorage.setItem('ohara-font', fontSize);
  }
  document.getElementById('font-up').addEventListener('click', () => {
    if (fontSize < 1.6) { fontSize = Math.round((fontSize + 0.05) * 100) / 100; applyFont(); }
  });
  document.getElementById('font-down').addEventListener('click', () => {
    if (fontSize > 0.8) { fontSize = Math.round((fontSize - 0.05) * 100) / 100; applyFont(); }
  });

  // ── Chapter rendering ────────────────────────────────────────
  function chapterHTML(ch) {
    const isFirst = ch.num === startChNum;
    return `
      ${!isFirst ? `<div class="chapter-section-divider">Chapter ${ch.num}</div>` : ''}
      <div class="chapter-section-title ${isFirst ? 'chapter-title-heading' : ''}">
        ${esc(ch.title || `Chapter ${ch.num}`)}
      </div>
      <div class="chapter-prose" style="font-size:${fontSize}rem">
        ${renderContent(ch.content)}
      </div>
    `;
  }

  function appendChapterToDOM(ch) {
    const container = document.getElementById('merged-chapters');
    const div = document.createElement('div');
    div.id = `ch-${ch.num}`;
    div.innerHTML = chapterHTML(ch);
    container.appendChild(div);
    if (ch.num > maxLoadedCh) maxLoadedCh = ch.num;
  }

  // ── URL sync — treat the merged range as one page ────────────
  function syncURL() {
    const q = new URLSearchParams({ slug, ch: startChNum });
    if (maxLoadedCh > startChNum) q.set('end', maxLoadedCh);
    history.replaceState(null, '', `chapter.html?${q}`);

    const label = maxLoadedCh > startChNum
      ? `Ch ${startChNum}–${maxLoadedCh}`
      : `Chapter ${startChNum}`;
    document.getElementById('bc-chapter').textContent = label;
    document.title = `${label} · ${meta.title} — Ohara`;
  }

  // ── Navigation helpers ───────────────────────────────────────
  function updateNavButtons() {
    const allNums = meta.chapters.map(c => c.num);
    const prevNum = allNums[allNums.indexOf(startChNum) - 1];
    const nextNum = allNums[allNums.indexOf(maxLoadedCh) + 1];

    const btnPrev = document.getElementById('btn-prev');
    if (prevNum !== undefined) {
      btnPrev.disabled = false;
      document.getElementById('prev-label').textContent = `Ch ${prevNum}`;
      btnPrev.onclick = () => go('chapter.html', { slug, ch: prevNum });
    } else {
      btnPrev.disabled = true;
      document.getElementById('prev-label').textContent = 'Start';
    }

    const btnNext = document.getElementById('btn-next');
    if (nextNum !== undefined) {
      btnNext.disabled = false;
      document.getElementById('next-label').textContent = `Ch ${nextNum}`;
      btnNext.onclick = () => go('chapter.html', { slug, ch: nextNum });
    } else {
      btnNext.disabled = true;
      document.getElementById('next-label').textContent = 'End';
    }

    const btnMerge = document.getElementById('btn-merge');
    const canMerge = nextNum !== undefined;
    btnMerge.disabled = !canMerge;
    if (!canMerge) btnMerge.textContent = '✓ All loaded';

    const startIdx = allNums.indexOf(startChNum) + 1;
    const endIdx   = allNums.indexOf(maxLoadedCh) + 1;
    const progress = startIdx === endIdx
      ? `${startIdx} / ${allNums.length}`
      : `${startIdx}–${endIdx} / ${allNums.length}`;
    document.getElementById('rh-progress').textContent = progress;
  }

  // ── Merge Next 10 ────────────────────────────────────────────
  document.getElementById('btn-merge').addEventListener('click', async () => {
    if (merging) return;
    merging = true;

    const allNums  = meta.chapters.map(c => c.num);
    const afterIdx = allNums.indexOf(maxLoadedCh) + 1;
    const toLoad   = allNums.slice(afterIdx, afterIdx + 10);
    if (!toLoad.length) { merging = false; return; }

    const btn    = document.getElementById('btn-merge');
    const loader = document.getElementById('loading-merge');
    btn.disabled = true;
    btn.textContent = 'Loading…';
    loader.textContent = `Fetching chapters ${toLoad[0]}–${toLoad[toLoad.length - 1]}`;
    loader.classList.add('visible');

    const results = await Promise.all(
      toLoad.map(n => loadChapter(slug, n).catch(() => null))
    );

    for (const ch of results) {
      if (ch) appendChapterToDOM(ch);
    }

    loader.classList.remove('visible');
    loader.textContent = '';
    btn.textContent = '⊕ Merge Next 10';
    merging = false;

    endChNum = maxLoadedCh;
    syncURL();
    updateNavButtons();

    const firstNew = document.getElementById(`ch-${toLoad[0]}`);
    if (firstNew) firstNew.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });

  // ── Reader mode — safely built without string interpolation crashes ──
  function openReader() {
    const container = document.getElementById('merged-chapters');
    if (!container || !meta) return;

    const allNums = meta.chapters.map(c => c.num);
    const prevNum = allNums[allNums.indexOf(startChNum) - 1];
    const nextNum = allNums[allNums.indexOf(maxLoadedCh) + 1];
    const base = window.location.origin + window.location.pathname.replace(/[^/]*$/, '');

    let articleHTML = '';
    const sections  = container.querySelectorAll('[id^="ch-"]');
    sections.forEach((sec, i) => {
      const titleEl = sec.querySelector('.chapter-section-title, .chapter-title-heading');
      const proseEl = sec.querySelector('.chapter-prose');
      if (i > 0) articleHTML += '<div class="ch-divider">— ✦ —</div>';
      if (titleEl) articleHTML += '<h2>' + titleEl.textContent.trim() + '</h2>';
      if (proseEl) articleHTML += '<article>' + proseEl.innerHTML + '</article>';
    });

    const prevLink = prevNum != null
      ? '<a href="' + base + 'chapter.html?slug=' + encodeURIComponent(slug) + '&ch=' + prevNum + '">&#8592; Ch ' + prevNum + '</a>'
      : '<span></span>';
    const nextLink = nextNum != null
      ? '<a href="' + base + 'chapter.html?slug=' + encodeURIComponent(slug) + '&ch=' + nextNum + '">Ch ' + nextNum + ' &#8594;</a>'
      : '<span></span>';

    const mergeDisabled = nextNum == null ? 'disabled' : '';
    const mergeLabel    = nextNum == null ? '✓ All loaded' : '⊕ Merge Next 10';
    const headingLabel  = startChNum + (maxLoadedCh > startChNum ? '&ndash;' + maxLoadedCh : '');

    const html = '<!DOCTYPE html>\n' +
'<html lang="en">\n' +
'<head>\n' +
'  <meta charset="UTF-8">\n' +
'  <meta name="viewport" content="width=device-width, initial-scale=1.0">\n' +
'  <title>' + meta.title.replace(/'/g, "&apos;") + ' — Chapter ' + startChNum + '</title>\n' +
'  <style>\n' +
'    :root{--ink:#1a1a1a;--dim:#666;--bg:#fff;--gold:#8a6a1a;--border:#ddd}\n' +
'    @media(prefers-color-scheme:dark){:root{--ink:#e9e4da;--dim:#9a9286;--bg:#111010;--gold:#c9a84c;--border:#2a2825}}\n' +
'    *{box-sizing:border-box;margin:0;padding:0}\n' +
'    body{background:var(--bg);color:var(--ink);font-family:Georgia,\'Times New Roman\',serif;\n' +
'         font-size:1.125rem;line-height:1.85;padding:40px 24px 80px;max-width:680px;margin:0 auto}\n' +
'    header{margin-bottom:32px;padding-bottom:20px;border-bottom:1px solid var(--border)}\n' +
'    header a{color:var(--gold);text-decoration:none;font-size:.85rem}\n' +
'    h1{font-size:1.35rem;font-weight:700;margin-top:10px;line-height:1.25}\n' +
'    h2{font-size:1.1rem;font-weight:700;color:var(--gold);margin:32px 0 14px}\n' +
'    article p{margin-bottom:1.4em;text-align:justify;hyphens:auto}\n' +
'    .ch-divider{text-align:center;padding:24px 0 8px;color:var(--dim);font-size:.9rem;letter-spacing:.2em}\n' +
'    #merge-status{text-align:center;padding:10px;font-size:.82rem;color:var(--dim);display:none}\n' +
'    nav{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;\n' +
'        margin-top:48px;padding-top:20px;border-top:1px solid var(--border);font-size:.88rem}\n' +
'    nav a{color:var(--gold);text-decoration:none}\n' +
'    nav a:hover{text-decoration:underline}\n' +
'    .nav-right{text-align:right}\n' +
'    .nav-mid{text-align:center}\n' +
'    .btn-merge{background:rgba(138,106,26,.12);border:1px solid var(--gold);color:var(--gold);\n' +
'               padding:9px 16px;border-radius:6px;cursor:pointer;font-family:Georgia,serif;\n' +
'               font-size:.85rem;font-weight:600;white-space:nowrap;transition:background .15s}\n' +
'    .btn-merge:hover:not(:disabled){background:rgba(138,106,26,.25)}\n' +
'    .btn-merge:disabled{opacity:.35;cursor:not-allowed}\n' +
'  </style>\n' +
'</head>\n' +
'<body>\n' +
'<header>\n' +
'  <a href="' + base + 'novel.html?slug=' + encodeURIComponent(slug) + '">&larr; ' + meta.title.replace(/'/g, "&apos;") + '</a>\n' +
'  <h1 id="pg-title">Chapter ' + headingLabel + '</h1>\n' +
'</header>\n' +
'<div id="chapters">' + articleHTML + '</div>\n' +
'<div id="merge-status"></div>\n' +
'<nav>\n' +
'  <span class="nav-left">' + prevLink + '</span>\n' +
'  <span class="nav-mid">\n' +
'    <button class="btn-merge" id="btn-merge" ' + mergeDisabled + '>' + mergeLabel + '</button>\n' +
'  </span>\n' +
'  <span class="nav-right" id="nav-right">' + nextLink + '</span>\n' +
'</nav>\n' +
'<script>\n' +
'  var BASE      = ' + JSON.stringify(base) + ';\n' +
'  var SLUG      = ' + JSON.stringify(slug) + ';\n' +
'  var ALL_NUMS  = ' + JSON.stringify(allNums) + ';\n' +
'  var META_CH   = ' + JSON.stringify(meta.chapters) + ';\n' +
'  var START_NUM = ' + startChNum + ';\n' +
'  var TITLE_META= ' + JSON.stringify(meta.title) + ';\n' +
'  var maxLoaded = ' + maxLoadedCh + ';\n' +
'  var merging   = false;\n' +
'\n' +
'  document.getElementById(\'btn-merge\').addEventListener(\'click\', async function() {\n' +
'    if (merging) return;\n' +
'    merging = true;\n' +
'    var btn    = document.getElementById(\'btn-merge\');\n' +
'    var status = document.getElementById(\'merge-status\');\n' +
'    var idx    = ALL_NUMS.indexOf(maxLoaded);\n' +
'    var toLoad = ALL_NUMS.slice(idx + 1, idx + 11);\n' +
'    if (!toLoad.length) { merging = false; return; }\n' +
'\n' +
'    btn.textContent = \'Loading\\u2026\';\n' +
'    btn.disabled = true;\n' +
'    status.style.display = \'block\';\n' +
'    status.textContent = \'Fetching chapters \' + toLoad[0] + \'\\u2013\' + toLoad[toLoad.length-1] + \'\\u2026\';\n' +
'\n' +
'    var container = document.getElementById(\'chapters\');\n' +
'    var firstNew  = null;\n' +
'\n' +
'    for (var i = 0; i < toLoad.length; i++) {\n' +
'      var n = toLoad[i];\n' +
'      try {\n' +
'        var ch = META_CH.find(c => c.num === n);\n' +
'        if (!ch || !ch.content) {\n' +
'          var res = await fetch(BASE + \'data/\' + SLUG + \'/chapters/\' + n + \'.json\');\n' +
'          ch  = await res.json();\n' +
'        }\n' +
'\n' +
'        var divider = document.createElement(\'div\');\n' +
'        divider.className = \'ch-divider\';\n' +
'        divider.textContent = \'\\u2014 \\u2726 \\u2014\';\n' +
'        container.appendChild(divider);\n' +
'\n' +
'        var h2 = document.createElement(\'h2\');\n' +
'        h2.textContent = ch.title || (\'Chapter \' + n);\n' +
'        container.appendChild(h2);\n' +
'\n' +
'        var art = document.createElement(\'article\');\n' +
'        var contentStr = ch.content || \'\';\n' +
'        var paragraphs = contentStr.split(/\\\\n\\\\n+|\\\\n\\\\r?\\\\n+|\\\\n+/);\n' +
'        if (paragraphs.length <= 1) {\n' +
'          paragraphs = contentStr.split(/\\\\n/);\n' +
'        }\n' +
'\n' +
'        art.innerHTML = paragraphs.filter(Boolean)\n' +
'          .map(function(p){ return \'<p>\' + p.replace(/&/g,\'&amp;\').replace(/</g,\'&lt;\').replace(/>/g,\'&gt;\') + \'</p>\'; })\n' +
'          .join(\'\');\n' +
'        container.appendChild(art);\n' +
'\n' +
'        if (!firstNew) firstNew = divider;\n' +
'        maxLoaded = n;\n' +
'      } catch(e) { console.warn(\'Failed ch \' + n, e); }\n' +
'    }\n' +
'\n' +
'    var newIdx  = ALL_NUMS.indexOf(maxLoaded) + 1;\n' +
'    var newNext = newIdx < ALL_NUMS.length ? ALL_NUMS[newIdx] : null;\n' +
'    var navRight = document.getElementById(\'nav-right\');\n' +
'    if (newNext) {\n' +
'      navRight.innerHTML = \'<a href="\' + BASE + \'chapter.html?slug=\' + encodeURIComponent(SLUG) + \'&ch=\' + newNext + \'">Ch \' + newNext + \' \\u2192</a>\';\n' +
'    } else {\n' +
'      navRight.innerHTML = \'<span></span>\';\n' +
'    }\n' +
'\n' +
'    document.getElementById(\'pg-title\').innerHTML = \'Chapter \' + START_NUM + \'&ndash;\' + maxLoaded;\n' +
'    document.title = TITLE_META + \' \\u2014 Chapter \' + START_NUM + \'\\u2013\' + maxLoaded;\n'\n' +
'\n' +
'    status.style.display = \'none\';\n' +
'    btn.textContent = newNext ? \'\\u2295 Merge Next 10\' : \'\\u2713 All loaded\';\n' +
'    btn.disabled = !newNext;\n' +
'    merging = false;\n' +
'\n' +
'    if (firstNew) firstNew.scrollIntoView({ behavior: \'smooth\', block: ' + JSON.stringify("start") + ' });\n' +
'  });\n' +
'<\/script>\n' +
'</body>\n' +
'</html>';

    const blob = new Blob([html], { type: 'text/html' });
    const url  = URL.createObjectURL(blob);
    window.open(url, '_blank');
    setTimeout(() => URL.revokeObjectURL(url), 10000);
  }

  // ── Init ─────────────────────────────────────────────────────
  async function init() {
    if (!slug || !startChNum) {
      document.getElementById('state-error').textContent = 'Missing slug or chapter number.';
      showState('state-error');
      return;
    }
    try {
      meta = await loadNovelMeta(slug);
      const allNums = meta.chapters.map(c => c.num);

      const bcNovel = document.getElementById('bc-novel');
      bcNovel.textContent = meta.title;
      bcNovel.href = `novel.html?slug=${esc(slug)}`;
      document.getElementById('rh-title').textContent = meta.title;

      const chaptersToLoad = endChNum > startChNum
        ? allNums.filter(n => n >= startChNum && n <= endChNum)
        : [startChNum];

      const results = await Promise.all(
        chaptersToLoad.map(n => loadChapter(slug, n).catch(() => null))
      );
      for (const ch of results) {
        if (ch) appendChapterToDOM(ch);
      }

      syncURL();
      updateNavButtons();
      showState('content');
      applyFont();
    } catch (e) {
      document.getElementById('state-error').textContent =
        'Chapter not found or failed to load. ' + e.message;
      showState('state-error');
    }
  }

  init();
</script>
</body>
</html>
