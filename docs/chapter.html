<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reading — Ohara</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Reading-specific layout tweaks */
    .chapter-prose { margin-top: 0; }
    #merged-chapters { margin-top: 0; }
    #loading-merge {
      text-align: center;
      padding: 24px;
      color: var(--ink-dim);
      font-size: .85rem;
      display: none;
    }
    #loading-merge.visible { display: block; }
    #loading-merge::after {
      content: '';
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin-left: 8px;
      vertical-align: middle;
    }
    .font-controls {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .font-btn {
      width: 30px; height: 30px;
      border: 1px solid var(--border);
      border-radius: var(--r);
      background: transparent;
      color: var(--ink-dim);
      cursor: pointer;
      font-family: inherit;
      font-size: .9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color .15s, color .15s;
    }
    .font-btn:hover { border-color: var(--gold-dim); color: var(--ink); }
    .nav-col-left  { display: flex; justify-content: flex-start; }
    .nav-col-mid   { display: flex; justify-content: center; }
    .nav-col-right { display: flex; justify-content: flex-end; }
  </style>
</head>
<body>

<!-- Sticky main header -->
<header class="site-header">
  <div class="inner">
    <a href="index.html" class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
      </svg>
      Ohara
    </a>
    <nav class="breadcrumb">
      <span class="sep">›</span>
      <a href="#" id="bc-novel" class="breadcrumb-link">…</a>
      <span class="sep">›</span>
      <span id="bc-chapter" style="color:var(--ink-dim)">…</span>
    </nav>
    <div class="header-right font-controls">
      <button id="btn-reader" onclick="openReader()"
         style="padding:5px 11px;border:1px solid var(--border);border-radius:var(--r);
                font-size:.78rem;color:var(--ink-dim);background:transparent;
                font-family:inherit;white-space:nowrap;cursor:pointer;
                transition:color .15s,border-color .15s"
         onmouseover="this.style.color='var(--gold)';this.style.borderColor='var(--gold-dim)'"
         onmouseout="this.style.color='var(--ink-dim)';this.style.borderColor='var(--border)'"
         title="Open clean page for Safari Reader">
        &#9783; Reader
      </button>
      <button class="font-btn" id="font-down" title="Smaller text">A−</button>
      <button class="font-btn" id="font-up"   title="Larger text">A+</button>
    </div>
  </div>
</header>

<!-- Sticky reader sub-header with chapter progress -->
<div class="reader-header">
  <div class="reader-header-inner">
    <span id="rh-title" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
    <span id="rh-progress" class="reader-progress"></span>
  </div>
</div>

<main>
  <div id="state-loading" class="state-loading" style="padding-top:80px">Loading chapter</div>
  <div id="state-error"   class="state-error hidden" style="padding-top:80px"></div>
  <div id="content"       class="hidden">

    <div class="prose-container">
      <div class="chapter-content-area">
        <!-- Chapter(s) render here -->
        <div id="merged-chapters"></div>
        <div id="loading-merge"></div>
      </div>

      <!-- Navigation: [Prev] [Merge Next 10] [Next] -->
      <div class="chapter-nav">
        <div class="nav-col-left">
          <button class="nav-btn prev" id="btn-prev" disabled>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
            <span><span class="nav-btn-label">Previous</span><span id="prev-label">—</span></span>
          </button>
        </div>
        <div class="nav-col-mid">
          <button class="nav-btn merge" id="btn-merge">
            ⊕ Merge Next 10
          </button>
        </div>
        <div class="nav-col-right">
          <button class="nav-btn next" id="btn-next" disabled>
            <span><span class="nav-btn-label">Next</span><span id="next-label">—</span></span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</main>

<footer class="site-footer">
  <div class="container">Ohara · personal library</div>
</footer>

<script src="app.js"></script>
<script>
  // ── State ────────────────────────────────────────────────────
  const slug       = params().get('slug');
  const startChNum = parseInt(params().get('ch')) || 1;
  // endChNum: set from URL when restoring a merged page, otherwise equals startChNum
  let   endChNum   = parseInt(params().get('end')) || startChNum;

  let meta      = null;
  let maxLoadedCh = 0;
  let fontSize  = parseFloat(localStorage.getItem('ohara-font') || '1.08');
  let merging   = false;

  // ── Font size controls ───────────────────────────────────────
  function applyFont() {
    document.querySelectorAll('.chapter-prose').forEach(el => {
      el.style.fontSize = fontSize + 'rem';
    });
    localStorage.setItem('ohara-font', fontSize);
  }
  document.getElementById('font-up').addEventListener('click', () => {
    if (fontSize < 1.6) { fontSize = Math.round((fontSize + 0.05) * 100) / 100; applyFont(); }
  });
  document.getElementById('font-down').addEventListener('click', () => {
    if (fontSize > 0.8) { fontSize = Math.round((fontSize - 0.05) * 100) / 100; applyFont(); }
  });

  // ── Chapter rendering ────────────────────────────────────────
  function chapterHTML(ch) {
    const isFirst = ch.num === startChNum;
    return `
      ${!isFirst ? `<div class="chapter-section-divider">Chapter ${ch.num}</div>` : ''}
      <div class="chapter-section-title ${isFirst ? 'chapter-title-heading' : ''}">
        ${esc(ch.title || `Chapter ${ch.num}`)}
      </div>
      <div class="chapter-prose" style="font-size:${fontSize}rem">
        ${renderContent(ch.content)}
      </div>
    `;
  }

  function appendChapterToDOM(ch) {
    const container = document.getElementById('merged-chapters');
    const div = document.createElement('div');
    div.id = `ch-${ch.num}`;
    div.innerHTML = chapterHTML(ch);
    container.appendChild(div);
    if (ch.num > maxLoadedCh) maxLoadedCh = ch.num;
  }

  // ── URL sync — treat the merged range as one page ────────────
  function syncURL() {
    const q = new URLSearchParams({ slug, ch: startChNum });
    if (maxLoadedCh > startChNum) q.set('end', maxLoadedCh);
    history.replaceState(null, '', `chapter.html?${q}`);

    // Update breadcrumb to show range
    const label = maxLoadedCh > startChNum
      ? `Ch ${startChNum}–${maxLoadedCh}`
      : `Chapter ${startChNum}`;
    document.getElementById('bc-chapter').textContent = label;
    document.title = `${label} · ${meta.title} — Ohara`;
  }

  // ── Navigation helpers ───────────────────────────────────────
  function updateNavButtons() {
    const allNums = meta.chapters.map(c => c.num);
    // Prev = chapter before the START of this page
    const prevNum = allNums[allNums.indexOf(startChNum) - 1];
    // Next = chapter after the END of this page (after all merged)
    const nextNum = allNums[allNums.indexOf(maxLoadedCh) + 1];

    const btnPrev = document.getElementById('btn-prev');
    if (prevNum !== undefined) {
      btnPrev.disabled = false;
      document.getElementById('prev-label').textContent = `Ch ${prevNum}`;
      btnPrev.onclick = () => go('chapter.html', { slug, ch: prevNum });
    } else {
      btnPrev.disabled = true;
      document.getElementById('prev-label').textContent = 'Start';
    }

    const btnNext = document.getElementById('btn-next');
    if (nextNum !== undefined) {
      btnNext.disabled = false;
      document.getElementById('next-label').textContent = `Ch ${nextNum}`;
      // Next jumps to the chapter right after the entire merged block
      btnNext.onclick = () => go('chapter.html', { slug, ch: nextNum });
    } else {
      btnNext.disabled = true;
      document.getElementById('next-label').textContent = 'End';
    }

    const btnMerge = document.getElementById('btn-merge');
    const canMerge = nextNum !== undefined;
    btnMerge.disabled = !canMerge;
    if (!canMerge) btnMerge.textContent = '✓ All loaded';

    // Progress shows range of loaded chapters
    const startIdx = allNums.indexOf(startChNum) + 1;
    const endIdx   = allNums.indexOf(maxLoadedCh) + 1;
    const progress = startIdx === endIdx
      ? `${startIdx} / ${allNums.length}`
      : `${startIdx}–${endIdx} / ${allNums.length}`;
    document.getElementById('rh-progress').textContent = progress;
  }

  // ── Merge Next 10 ────────────────────────────────────────────
  document.getElementById('btn-merge').addEventListener('click', async () => {
    if (merging) return;
    merging = true;

    const allNums  = meta.chapters.map(c => c.num);
    const afterIdx = allNums.indexOf(maxLoadedCh) + 1;
    const toLoad   = allNums.slice(afterIdx, afterIdx + 10);
    if (!toLoad.length) { merging = false; return; }

    const btn    = document.getElementById('btn-merge');
    const loader = document.getElementById('loading-merge');
    btn.disabled = true;
    btn.textContent = 'Loading…';
    loader.textContent = `Fetching chapters ${toLoad[0]}–${toLoad[toLoad.length - 1]}`;
    loader.classList.add('visible');

    const results = await Promise.all(
      toLoad.map(n => loadChapter(slug, n).catch(() => null))
    );

    for (const ch of results) {
      if (ch) appendChapterToDOM(ch);
    }

    loader.classList.remove('visible');
    loader.textContent = '';
    btn.textContent = '⊕ Merge Next 10';
    merging = false;

    // Update URL so this merged range is the new "page"
    endChNum = maxLoadedCh;
    syncURL();
    updateNavButtons();

    // Scroll to first newly loaded chapter
    const firstNew = document.getElementById(`ch-${toLoad[0]}`);
    if (firstNew) firstNew.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });

  // ── Reader mode — build a clean HTML page from loaded JSON ──
  // We re-fetch the JSON for clean content rather than scraping the styled DOM
  async function openReader() {
    if (!meta) return;

    const allNums = meta.chapters.map(c => c.num);
    const prevNum = allNums[allNums.indexOf(startChNum) - 1];
    const nextNum = allNums[allNums.indexOf(maxLoadedCh) + 1];
    const base    = window.location.origin + window.location.pathname.replace(/[^/]*$/, '');

    // Collect nums currently shown (start through maxLoaded)
    const shownNums = allNums.filter(n => n >= startChNum && n <= maxLoadedCh);

    // Fetch all shown chapters fresh from JSON for clean, unstyled content
    const chapters = await Promise.all(
      shownNums.map(n => loadChapter(slug, n).catch(() => null))
    );

    function chToHTML(ch, isFirst) {
      if (!ch) return '';
      const paras = (ch.content || '').split(/\n\n+/).filter(Boolean)
        .map(p => `<p>${esc(p.trim())}</p>`).join('\n');
      const heading = isFirst
        ? `<h1>${esc(ch.title || 'Chapter ' + ch.num)}</h1>`
        : `<div class="ch-divider">— ✦ —</div><h2>${esc(ch.title || 'Chapter ' + ch.num)}</h2>`;
      return heading + '\n' + paras;
    }

    let articleHTML = chapters.map((ch, i) => chToHTML(ch, i === 0)).join('\n');

    const prevLink = prevNum != null
      ? `<a href="${base}chapter.html?slug=${encodeURIComponent(slug)}&ch=${prevNum}">&#8592; Ch ${prevNum}</a>`
      : '<span></span>';
    const nextLink = nextNum != null
      ? `<a href="${base}chapter.html?slug=${encodeURIComponent(slug)}&ch=${nextNum}">Ch ${nextNum} &#8594;</a>`
      : '<span></span>';

    const mergeDisabled = nextNum == null ? 'disabled' : '';
    const mergeLabel    = nextNum == null ? '✓ All loaded' : '⊕ Merge Next 10';

    const html = `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>${esc(meta.title)} — Chapter ${startChNum}</title>
  <style>
    :root{--ink:#1a1a1a;--dim:#666;--bg:#fff;--gold:#8a6a1a;--border:#ddd}
    @media(prefers-color-scheme:dark){:root{--ink:#e9e4da;--dim:#9a9286;--bg:#111010;--gold:#c9a84c;--border:#2a2825}}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--ink);font-family:Georgia,'Times New Roman',serif;
         font-size:1.125rem;line-height:1.85;padding:40px 24px 80px;max-width:680px;margin:0 auto}
    header{margin-bottom:32px;padding-bottom:20px;border-bottom:1px solid var(--border)}
    header a{color:var(--gold);text-decoration:none;font-size:.85rem}
    h1{font-size:1.35rem;font-weight:700;margin:10px 0 24px;line-height:1.25}
    h2{font-size:1.1rem;font-weight:700;color:var(--gold);margin:32px 0 14px}
    p{margin-bottom:1.4em;text-align:justify;hyphens:auto}
    .ch-divider{text-align:center;padding:24px 0 8px;color:var(--dim);font-size:.9rem;letter-spacing:.2em}
    #merge-status{text-align:center;padding:10px;font-size:.82rem;color:var(--dim);display:none}
    nav{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;
        margin-top:48px;padding-top:20px;border-top:1px solid var(--border);font-size:.88rem}
    nav a{color:var(--gold);text-decoration:none}
    nav a:hover{text-decoration:underline}
    .nav-right{text-align:right}
    .nav-mid{text-align:center}
    .btn-merge{background:rgba(138,106,26,.12);border:1px solid var(--gold);color:var(--gold);
               padding:9px 16px;border-radius:6px;cursor:pointer;font-family:Georgia,serif;
               font-size:.85rem;font-weight:600;white-space:nowrap;transition:background .15s}
    .btn-merge:hover:not(:disabled){background:rgba(138,106,26,.25)}
    .btn-merge:disabled{opacity:.35;cursor:not-allowed}
  </style>
</head>
<body>
<header>
  <a href="${base}novel.html?slug=${encodeURIComponent(slug)}">&larr; ${esc(meta.title)}</a>
</header>
<article id="chapters">
${articleHTML}
</article>
<div id="merge-status"></div>
<nav>
  <span class="nav-left">${prevLink}</span>
  <span class="nav-mid">
    <button class="btn-merge" id="btn-merge" ${mergeDisabled}>${mergeLabel}</button>
  </span>
  <span class="nav-right" id="nav-right">${nextLink}</span>
</nav>
<script>
  var BASE      = ${JSON.stringify(base)};
  var SLUG      = ${JSON.stringify(slug)};
  var ALL_NUMS  = ${JSON.stringify(allNums)};
  var maxLoaded = ${maxLoadedCh};
  var merging   = false;

  function escHTML(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  document.getElementById('btn-merge').addEventListener('click', async function() {
    if (merging) return;
    merging = true;
    var btn    = document.getElementById('btn-merge');
    var status = document.getElementById('merge-status');
    var idx    = ALL_NUMS.indexOf(maxLoaded);
    var toLoad = ALL_NUMS.slice(idx + 1, idx + 11);
    if (!toLoad.length) { merging = false; return; }

    btn.textContent = 'Loading\u2026';
    btn.disabled = true;
    status.style.display = 'block';
    status.textContent = 'Fetching chapters ' + toLoad[0] + '\u2013' + toLoad[toLoad.length-1] + '\u2026';

    var container = document.getElementById('chapters');
    var firstNew  = null;

    for (var i = 0; i < toLoad.length; i++) {
      var n = toLoad[i];
      try {
        var res = await fetch(BASE + 'data/' + SLUG + '/chapters/' + n + '.json');
        var ch  = await res.json();

        var divider = document.createElement('div');
        divider.className = 'ch-divider';
        divider.textContent = '\u2014 \u2726 \u2014';
        container.appendChild(divider);

        var h2 = document.createElement('h2');
        h2.textContent = ch.title || ('Chapter ' + n);
        container.appendChild(h2);

        (ch.content || '').split(/\n\n+/).filter(Boolean).forEach(function(para) {
          var p = document.createElement('p');
          p.textContent = para.trim();
          container.appendChild(p);
        });

        if (!firstNew) firstNew = divider;
        maxLoaded = n;
      } catch(e) { console.warn('Failed ch ' + n, e); }
    }

    var newIdx  = ALL_NUMS.indexOf(maxLoaded) + 1;
    var newNext = newIdx < ALL_NUMS.length ? ALL_NUMS[newIdx] : null;
    document.getElementById('nav-right').innerHTML = newNext
      ? '<a href="' + BASE + 'chapter.html?slug=' + encodeURIComponent(SLUG) + '&ch=' + newNext + '">Ch ' + newNext + ' \u2192</a>'
      : '<span></span>';

    status.style.display = 'none';
    btn.textContent = newNext ? '\u2295 Merge Next 10' : '\u2713 All loaded';
    btn.disabled = !newNext;
    merging = false;

    if (firstNew) firstNew.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });
<\/script>
</body>
</html>`;

    const newWin = window.open('', '_blank');
    if (!newWin) {
      alert('Pop-up blocked. Please allow pop-ups for this site.');
      return;
    }
    newWin.document.write(html);
    newWin.document.close();
  }

  // ── Init ─────────────────────────────────────────────────────
  async function init() {
    if (!slug || !startChNum) {
      document.getElementById('state-error').textContent = 'Missing slug or chapter number.';
      showState('state-error');
      return;
    }
    try {
      meta = await loadNovelMeta(slug);
      const allNums = meta.chapters.map(c => c.num);

      // Breadcrumb & title (updated again by syncURL after loading)
      const bcNovel = document.getElementById('bc-novel');
      bcNovel.textContent = meta.title;
      bcNovel.href = `novel.html?slug=${esc(slug)}`;
      document.getElementById('rh-title').textContent = meta.title;

      // Determine the full range to load on this page
      // If ?end= is in the URL, restore all chapters from start→end
      const chaptersToLoad = endChNum > startChNum
        ? allNums.filter(n => n >= startChNum && n <= endChNum)
        : [startChNum];

      // Load all chapters in range (parallel)
      const results = await Promise.all(
        chaptersToLoad.map(n => loadChapter(slug, n).catch(() => null))
      );
      for (const ch of results) {
        if (ch) appendChapterToDOM(ch);
      }

      syncURL();
      updateNavButtons();
      showState('content');
      applyFont();
    } catch (e) {
      document.getElementById('state-error').textContent =
        'Chapter not found or failed to load. ' + e.message;
      showState('state-error');
    }
  }

  init();
</script>
</body>
</html>
