<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reading — Ohara</title>
  <style>
    :root {
      --ink: #1a1a1a; --dim: #666; --bg: #fff;
      --gold: #8a6a1a; --border: #ddd;
    }
    @media (prefers-color-scheme: dark) {
      :root { --ink: #e9e4da; --dim: #9a9286; --bg: #111010; --gold: #c9a84c; --border: #2a2825; }
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 18px; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: Georgia, 'Times New Roman', serif;
      line-height: 1.85;
      padding: 40px 24px 80px;
      max-width: 680px;
      margin: 0 auto;
    }
    header {
      margin-bottom: 32px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    header a {
      color: var(--gold);
      text-decoration: none;
      font-size: .85rem;
    }
    h1 {
      font-size: 1.35rem;
      font-weight: 700;
      margin-top: 10px;
      line-height: 1.25;
    }
    h2 {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--gold);
      margin: 36px 0 14px;
    }
    article p {
      margin-bottom: 1.4em;
      text-align: justify;
      hyphens: auto;
    }
    .ch-divider {
      text-align: center;
      padding: 28px 0 12px;
      color: var(--dim);
      font-size: .85rem;
      letter-spacing: .15em;
    }
    .loading {
      text-align: center;
      padding: 60px 0;
      color: var(--dim);
      font-size: .95rem;
    }
    .error { color: #c0392b; text-align: center; padding: 60px 0; }
    nav {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 12px;
      align-items: center;
      margin-top: 52px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      font-size: .88rem;
    }
    nav a { color: var(--gold); text-decoration: none; }
    nav a:hover { text-decoration: underline; }
    .nav-right { text-align: right; }
    .nav-mid { text-align: center; }
    .btn-merge {
      background: rgba(138,106,26,.12);
      border: 1px solid var(--gold);
      color: var(--gold);
      padding: 10px 18px;
      border-radius: 6px;
      cursor: pointer;
      font-family: Georgia, serif;
      font-size: .85rem;
      font-weight: 600;
      white-space: nowrap;
      transition: background .15s;
      text-decoration: none;
      display: inline-block;
    }
    .btn-merge:hover { background: rgba(138,106,26,.25); }
    .btn-merge.disabled {
      opacity: .35;
      pointer-events: none;
    }
  </style>
</head>
<body>

<header>
  <a id="back-link" href="index.html">&larr; Library</a>
  <h1 id="page-title">Loading…</h1>
</header>

<div id="body-content">
  <div class="loading">Loading chapters…</div>
</div>

<nav id="nav" style="display:none">
  <span class="nav-left" id="nav-prev"></span>
  <span class="nav-mid"  id="nav-merge"></span>
  <span class="nav-right" id="nav-next"></span>
</nav>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="app.js"></script>
<script>
  const slug     = params().get('slug');
  const startCh  = parseInt(params().get('ch'))  || 1;
  const endCh    = parseInt(params().get('end')) || startCh;
  const DATA_URL = './data';

  async function init() {
    await checkAuth();
    if (!slug) { showError('Missing novel slug.'); return; }

    try {
      // Load meta for nav context
      const meta = await loadNovelMeta(slug);
      const allNums = meta.chapters.map(c => c.num);

      document.getElementById('back-link').href  = `novel.html?slug=${encodeURIComponent(slug)}`;
      document.getElementById('back-link').textContent = `\u2190 ${meta.title}`;

      // Chapters to load: everything from startCh to endCh
      const toLoad = allNums.filter(n => n >= startCh && n <= endCh);
      if (!toLoad.length) { showError('No chapters found in range.'); return; }

      // Fetch all in parallel
      const chapters = await Promise.all(
        toLoad.map(n => loadChapter(slug, n).catch(() => null))
      );

      // Render
      const loaded = chapters.filter(Boolean);
      if (!loaded.length) { showError('Could not load any chapters.'); return; }

      const firstCh = loaded[0];
      const lastNum = loaded[loaded.length - 1].num;

      // Update title
      const titleText = lastNum > startCh
        ? `Chapters ${startCh}–${lastNum}`
        : (firstCh.title || `Chapter ${startCh}`);
      document.title = `${meta.title} — ${titleText}`;
      document.getElementById('page-title').textContent = titleText;

      // Save reading progress
      saveProgress(slug, startCh, firstCh.title || `Chapter ${startCh}`);

      // Build article HTML
      let html = '';
      loaded.forEach((ch, i) => {
        if (i > 0) html += `<div class="ch-divider">— ✦ —</div>\n<h2>${esc(ch.title || 'Chapter ' + ch.num)}</h2>\n`;
        const paras = (ch.content || '')
          .split(/\n\n+/)
          .filter(p => p.trim())
          .map(p => `<p>${esc(p.trim())}</p>`)
          .join('\n');
        html += paras;
      });
      document.getElementById('body-content').innerHTML = `<article>${html}</article>`;

      // Build navigation
      const prevNum  = allNums[allNums.indexOf(startCh) - 1];
      const nextNum  = allNums[allNums.indexOf(lastNum) + 1];
      // "Merge next 10" lands on same startCh but with end extended by 10
      const mergeEnd = nextNum != null
        ? allNums[Math.min(allNums.indexOf(lastNum) + 10, allNums.length - 1)]
        : null;

      const prevLink = prevNum != null
        ? `<a href="reader.html?slug=${encodeURIComponent(slug)}&ch=${prevNum}">\u2190 Ch ${prevNum}</a>`
        : '';
      const nextLink = nextNum != null
        ? `<a href="reader.html?slug=${encodeURIComponent(slug)}&ch=${nextNum}">Ch ${nextNum} \u2192</a>`
        : '';
      const mergeLink = mergeEnd != null && mergeEnd !== lastNum
        ? `<a class="btn-merge" href="reader.html?slug=${encodeURIComponent(slug)}&ch=${startCh}&end=${mergeEnd}">\u2295 Merge Next 10</a>`
        : `<span class="btn-merge disabled">\u2713 All loaded</span>`;

      document.getElementById('nav-prev').innerHTML  = prevLink;
      document.getElementById('nav-merge').innerHTML = mergeLink;
      document.getElementById('nav-next').innerHTML  = nextLink;
      document.getElementById('nav').style.display   = '';

    } catch (e) {
      showError('Failed to load: ' + e.message);
    }
  }

  function showError(msg) {
    document.getElementById('body-content').innerHTML = `<div class="error">${esc(msg)}</div>`;
    document.getElementById('page-title').textContent = 'Error';
  }

  init();
</script>
</body>
</html>
