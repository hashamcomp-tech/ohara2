<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ohara — Your Novel Library</title>
  <meta name="description" content="A personal web novel library. Browse and read scraped novels offline.">
  <link rel="stylesheet" href="style.css">
  <style>
    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 32px 0 64px;
      flex-wrap: wrap;
    }
    .pg-btn {
      min-width: 38px;
      height: 38px;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: var(--r);
      background: var(--bg-card);
      color: var(--ink-dim);
      font-size: .85rem;
      font-family: inherit;
      cursor: pointer;
      transition: border-color .15s, color .15s, background .15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .pg-btn:hover:not(:disabled) {
      border-color: var(--gold-dim);
      color: var(--ink);
    }
    .pg-btn.active {
      background: rgba(201,168,76,.15);
      border-color: var(--gold);
      color: var(--gold);
      font-weight: 700;
    }
    .pg-btn:disabled { opacity: .3; cursor: not-allowed; }
    .pg-info {
      font-size: .8rem;
      color: var(--ink-faint);
      padding: 0 8px;
    }
    .pg-ellipsis {
      color: var(--ink-faint);
      font-size: .85rem;
      padding: 0 4px;
    }
  </style>
</head>
<body>

<header class="site-header">
  <div class="inner">
    <a href="index.html" class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
      </svg>
      Ohara
    </a>
    <span class="header-tagline">Library</span>
    <div style="margin-left:auto">
      <button onclick="logout()"
        style="background:transparent;border:1px solid var(--border);border-radius:var(--r);
               padding:5px 12px;color:var(--ink-faint);font-family:inherit;font-size:.78rem;
               cursor:pointer;transition:color .15s,border-color .15s"
        onmouseover="this.style.color='var(--ink)';this.style.borderColor='var(--ink-faint)'"
        onmouseout="this.style.color='var(--ink-faint)';this.style.borderColor='var(--border)'">
        Sign out
      </button>
    </div>
  </div>
</header>

<main>
  <div class="container">

    <div class="page-hero">
      <h1>Your <span>Library</span></h1>
      <p>All scraped novels, ready to read.</p>
    </div>

    <div class="search-bar">
      <input class="search-input" type="search" id="search" placeholder="Search novels…" autocomplete="off">
      <button id="btn-filter" onclick="toggleContentFilter()"
        style="flex-shrink:0;padding:10px 14px;border:1px solid var(--border);border-radius:var(--r);
               background:var(--bg-card);color:var(--ink-dim);font-family:inherit;font-size:.82rem;
               cursor:pointer;white-space:nowrap;transition:border-color .15s,color .15s"
        title="Hide adult/smut/harem novels">
        🔒 Filter On
      </button>
    </div>

    <div id="stats-bar" class="stats-bar hidden"></div>
    <div id="tag-filter-bar" class="tag-filter hidden"></div>

    <div id="state-loading" class="state-loading">Loading library</div>
    <div id="state-error"   class="state-error   hidden"></div>
    <div id="state-empty"   class="state-empty   hidden">
      No novels yet.<p>Run the scraper, then push <code>docs/data/</code> to GitHub.</p>
    </div>
    <div id="content" class="hidden">
      <div id="novel-grid" class="novel-grid"></div>
      <div id="pagination" class="pagination"></div>
    </div>

  </div>
</main>

<footer class="site-footer">
  <div class="container">Ohara · personal library</div>
</footer>

<script src="app.js"></script>
<script>
  const PER_PAGE    = 50;
  const BLOCKED_TAGS = ['adult', 'smut', 'harem', 'ecchi', 'erotic', 'r-18', 'r18', 'sexual content', 'nsfw', '18+', '18plus', 'josei'];

  let allNovels      = [];   // full list, never mutated
  let filteredNovels = [];   // result after search + tag + content filter
  let currentPage    = 0;    // 0-indexed
  let activeTag      = null;
  let searchQuery    = '';
  let offlineSlugSet = new Set();
  let offlineCoverURLs = {};
  let contentFilterOn = sessionStorage.getItem('ohara-filter') !== 'off';

  // ── Content filter ───────────────────────────────────────────
  function toggleContentFilter() {
    if (contentFilterOn) {
      const pwd = prompt("Enter password to unlock:");
      if (pwd !== "1234567890qwertyuiopasdfghjklzxcvbnm") {
        alert("Incorrect password.");
        return;
      }
    }
    contentFilterOn = !contentFilterOn;
    sessionStorage.setItem('ohara-filter', contentFilterOn ? 'on' : 'off');
    updateFilterBtn();
    buildTagBar();
    applyFilters();
  }

  function updateFilterBtn() {
    const btn = document.getElementById('btn-filter');
    if (contentFilterOn) {
      btn.textContent = '🔒 Filter On';
      btn.style.color = 'var(--gold)';
      btn.style.borderColor = 'var(--gold-dim)';
    } else {
      btn.textContent = '🔓 Filter Off';
      btn.style.color = 'var(--ink-faint)';
      btn.style.borderColor = 'var(--border)';
    }
  }

  function isBlocked(n) {
    if (!contentFilterOn) return false;
    const tags = (n.tags || []).map(t => t.toLowerCase());
    return BLOCKED_TAGS.some(b => tags.includes(b));
  }

  // ── Init ─────────────────────────────────────────────────────
  async function init() {
    checkAuth();
    try {
      const index = await loadIndex();
      allNovels = (index.novels || []).sort((a, b) =>
        (a.lastUpdated || '').localeCompare(b.lastUpdated || '')
      );
      offlineSlugSet = new Set(await listOfflineSlugs());

      // Pre-load offline cover blob URLs for saved novels so they show offline
      offlineCoverURLs = {};
      if (!navigator.onLine) {
        await Promise.all([...offlineSlugSet].map(async slug => {
          const url = await getCoverURL(slug, '');
          if (url) offlineCoverURLs[slug] = url;
        }));
      }

      if (!allNovels.length) { showState('state-empty'); return; }

      updateFilterBtn();
      buildTagBar();
      applyFilters();
      showState('content');

      if (!navigator.onLine) {
        document.getElementById('stats-bar').insertAdjacentHTML(
          'afterend',
          `<div style="font-size:.78rem;color:var(--ink-faint);padding:8px 0">
            📡 Offline — showing your saved novels only.
          </div>`
        );
      } else if (offlineSlugSet.size) {
        // Background-sync offline novels, throttled to once per 30 min
        const THROTTLE_MS = 30 * 60 * 1000;
        const lastSync = parseInt(localStorage.getItem('ohara-last-sync') || '0');
        if (Date.now() - lastSync > THROTTLE_MS) {
          localStorage.setItem('ohara-last-sync', String(Date.now()));
          autoSyncOfflineLibrary(); // fire and forget, runs silently in background
        }
      }
    } catch (e) {
      document.getElementById('state-error').textContent = 'Could not load library. ' + e.message;
      showState('state-error');
    }
  }

  // ── Tag bar ──────────────────────────────────────────────────
  function buildTagBar() {
    const tagCount = {};
    allNovels.forEach(n => (n.tags || []).forEach(t => {
      tagCount[t] = (tagCount[t] || 0) + 1;
    }));
    let tags = Object.keys(tagCount).sort();
    if (contentFilterOn) {
      tags = tags.filter(t => !BLOCKED_TAGS.includes(t.toLowerCase()));
      // If the active tag just got hidden, clear it
      if (activeTag && !tags.includes(activeTag)) activeTag = null;
    }
    const bar = document.getElementById('tag-filter-bar');
    if (!tags.length) { bar.classList.add('hidden'); bar.innerHTML = ''; return; }
    bar.innerHTML =
      `<span class="tag-filter-label">Tags</span>` +
      tags.map(t =>
        `<span class="tag ${t===activeTag?'active':''}" data-tag="${esc(t)}" onclick="filterByTag('${esc(t)}')">${esc(t)}</span>`
      ).join('') +
      `<button class="tag-clear ${activeTag?'':'hidden'}" id="tag-clear" onclick="clearTag()">✕ Clear</button>`;
    bar.classList.remove('hidden');
  }

  function filterByTag(tag) {
    activeTag = activeTag === tag ? null : tag;
    document.querySelectorAll('.tag[data-tag]').forEach(el =>
      el.classList.toggle('active', el.dataset.tag === activeTag)
    );
    const cb = document.getElementById('tag-clear');
    if (cb) cb.classList.toggle('hidden', !activeTag);
    applyFilters();
  }

  function clearTag() {
    activeTag = null;
    document.querySelectorAll('.tag[data-tag]').forEach(el => el.classList.remove('active'));
    const cb = document.getElementById('tag-clear');
    if (cb) cb.classList.add('hidden');
    applyFilters();
  }

  // ── Core filter + render ─────────────────────────────────────
  function applyFilters(resetPage = true) {
    if (resetPage) currentPage = 0;

    filteredNovels = allNovels
      .filter(n => !isBlocked(n))
      .filter(n => !activeTag   || (n.tags || []).includes(activeTag))
      .filter(n => !searchQuery || n.title.toLowerCase().includes(searchQuery));

    const hidden  = allNovels.filter(n => isBlocked(n)).length;
    const totalCh = allNovels.reduce((s, n) => s + (n.totalChapters || 0), 0);
    const statsBar = document.getElementById('stats-bar');
    statsBar.innerHTML =
      `<strong>${filteredNovels.length}</strong> of <strong>${allNovels.length}</strong> novels` +
      ` &nbsp;·&nbsp; <strong>${totalCh.toLocaleString()}</strong> chapters` +
      (hidden && contentFilterOn ? ` &nbsp;·&nbsp; <span style="color:var(--ink-faint)">${hidden} hidden</span>` : '');
    statsBar.classList.remove('hidden');

    renderPage();
  }

  function renderPage() {
    const start  = currentPage * PER_PAGE;
    const slice  = filteredNovels.slice(start, start + PER_PAGE);
    const grid   = document.getElementById('novel-grid');

    if (!filteredNovels.length) {
      grid.innerHTML = `<p style="color:var(--ink-dim);font-size:.9rem;padding:24px 0">No novels match your filters.</p>`;
      document.getElementById('pagination').innerHTML = '';
      return;
    }

    grid.innerHTML = slice.map((n, idx) => {
      const prog   = getProgress(n.slug);
      const rating = getRating(n.slug);
      // Eagerly load the first row (roughly the first 6 cards) so the
      // above-the-fold covers appear immediately; lazy-load the rest so
      // the browser only fetches them as the user scrolls down.
      const loadingAttr = idx < 6 ? 'eager' : 'lazy';
      return `
      <div class="novel-card" onclick="go('novel.html',{slug:'${esc(n.slug)}'})" role="link" tabindex="0"
           onkeydown="if(event.key==='Enter')go('novel.html',{slug:'${esc(n.slug)}'})">
        <div class="novel-card-cover">
          ${(() => {
            const src = offlineCoverURLs[n.slug] || n.cover;
            return src
              ? `<img src="${esc(src)}" alt="${esc(n.title)}" loading="${loadingAttr}" decoding="async"
                      onerror="this.parentElement.innerHTML='<span class=cover-fallback>📖</span>'">`
              : `<span class="cover-fallback">📖</span>`;
          })()}
        </div>
        <div class="novel-card-body">
          <div class="novel-card-title">${esc(n.title)}</div>
          ${(n.tags||[]).length
            ? `<div class="tags" style="margin-top:6px">${
                n.tags.slice(0,3).map(t =>
                  `<span class="tag" style="font-size:.65rem;padding:2px 7px"
                         onclick="event.stopPropagation();filterByTag('${esc(t)}')">${esc(t)}</span>`
                ).join('')}</div>`
            : ''}
          ${prog ? `<div class="progress-badge" style="margin-top:6px">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
            Ch ${prog.chapter}
          </div>` : ''}
          ${offlineSlugSet.has(n.slug) ? `<div class="progress-badge" style="margin-top:4px;background:rgba(120,180,120,.1);color:#7bc97b;border-color:rgba(120,180,120,.25)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 13l4 4L19 7"/></svg>
            Offline
          </div>` : ''}
          ${rating ? `<div style="margin-top:4px;font-size:.85rem;color:var(--gold)">${'★'.repeat(rating)}${'☆'.repeat(5-rating)}</div>` : ''}
          <div class="novel-card-meta" style="margin-top:6px">
            <span class="badge badge-gold">${(n.totalChapters||0).toLocaleString()} ch</span>
            ${n.lastUpdated
              ? `<br><small style="color:var(--ink-faint);font-size:.72rem">Updated ${n.lastUpdated}</small>`
              : ''}
          </div>
        </div>
      </div>
    `}).join('');

    renderPagination();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ── Pagination controls ──────────────────────────────────────
  function renderPagination() {
    const totalPages = Math.ceil(filteredNovels.length / PER_PAGE);
    const pg = document.getElementById('pagination');
    if (totalPages <= 1) { pg.innerHTML = ''; return; }

    const p = currentPage;
    let html = '';

    // Prev
    html += `<button class="pg-btn" onclick="goPage(${p-1})" ${p===0?'disabled':''}>&#8592;</button>`;

    // Page numbers with ellipsis
    const pages = pageNumbers(p, totalPages);
    let prev = null;
    for (const n of pages) {
      if (prev !== null && n - prev > 1) html += `<span class="pg-ellipsis">…</span>`;
      html += `<button class="pg-btn ${n===p?'active':''}" onclick="goPage(${n})">${n+1}</button>`;
      prev = n;
    }

    // Next
    html += `<button class="pg-btn" onclick="goPage(${p+1})" ${p===totalPages-1?'disabled':''}>&#8594;</button>`;

    // Page info
    const start = p * PER_PAGE + 1;
    const end   = Math.min((p+1) * PER_PAGE, filteredNovels.length);
    html += `<span class="pg-info">${start}–${end} of ${filteredNovels.length}</span>`;

    pg.innerHTML = html;
  }

  function pageNumbers(current, total) {
    // Always show: first, last, current, and 1 either side of current
    const set = new Set([0, total-1, current, current-1, current+1].filter(n => n>=0 && n<total));
    return [...set].sort((a,b) => a-b);
  }

  function goPage(n) {
    const totalPages = Math.ceil(filteredNovels.length / PER_PAGE);
    if (n < 0 || n >= totalPages) return;
    currentPage = n;
    renderPage();
  }

  // ── Search — debounced for snappiness ────────────────────────
  let searchTimer;
  document.getElementById('search').addEventListener('input', e => {
    clearTimeout(searchTimer);
    // Instant for short queries, tiny debounce for long ones
    const delay = e.target.value.length < 3 ? 0 : 80;
    searchTimer = setTimeout(() => {
      searchQuery = e.target.value.toLowerCase().trim();
      applyFilters();
    }, delay);
  });

  init();
</script>
</body>
</html>
