<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ohara — Your Novel Library</title>
  <meta name="description" content="A personal web novel library. Browse and read scraped novels offline.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-header">
  <div class="inner">
    <a href="index.html" class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
      </svg>
      Ohara
    </a>
    <span class="header-tagline">Library</span>
  </div>
</header>

<main>
  <div class="container">

    <div class="page-hero">
      <h1>Your <span>Library</span></h1>
      <p>All scraped novels, ready to read.</p>
    </div>

    <div class="search-bar">
      <input class="search-input" type="search" id="search" placeholder="Search novels…" autocomplete="off">
      <button id="btn-filter" onclick="toggleContentFilter()"
        style="flex-shrink:0;padding:10px 14px;border:1px solid var(--border);border-radius:var(--r);
               background:var(--bg-card);color:var(--ink-dim);font-family:inherit;font-size:.82rem;
               cursor:pointer;white-space:nowrap;transition:border-color .15s,color .15s"
        title="Hide adult/smut/harem novels">
        🔒 Filter On
      </button>
    </div>

    <div id="stats-bar" class="stats-bar hidden"></div>

    <div id="tag-filter-bar" class="tag-filter hidden"></div>

    <div id="state-loading" class="state-loading">Loading library</div>
    <div id="state-error"   class="state-error   hidden"></div>
    <div id="state-empty"   class="state-empty   hidden">
      No novels yet.<p>Run the scraper, then push <code>docs/data/</code> to GitHub.</p>
    </div>
    <div id="content" class="hidden">
      <div id="novel-grid" class="novel-grid"></div>
    </div>

  </div>
</main>

<footer class="site-footer">
  <div class="container">Ohara · personal library</div>
</footer>

<script src="app.js"></script>
<script>
  let allNovels   = [];
  let activeTag   = null;
  let searchQuery = '';

  // Tags to hide when content filter is ON
  const BLOCKED_TAGS = ['adult', 'smut', 'harem', 'ecchi', 'erotic', 'r-18', 'r18', 'sexual content'];

  // Filter is ON by default; persisted in localStorage
  let contentFilterOn = localStorage.getItem('ohara-filter') !== 'off';

  function toggleContentFilter() {
    contentFilterOn = !contentFilterOn;
    localStorage.setItem('ohara-filter', contentFilterOn ? 'on' : 'off');
    updateFilterBtn();
    applyFilters();
  }

  function updateFilterBtn() {
    const btn = document.getElementById('btn-filter');
    if (contentFilterOn) {
      btn.textContent = '🔒 Filter On';
      btn.style.color = 'var(--gold)';
      btn.style.borderColor = 'var(--gold-dim)';
    } else {
      btn.textContent = '🔓 Filter Off';
      btn.style.color = 'var(--ink-faint)';
      btn.style.borderColor = 'var(--border)';
    }
  }

  function isBlocked(novel) {
    if (!contentFilterOn) return false;
    const tags = (novel.tags || []).map(t => t.toLowerCase());
    return BLOCKED_TAGS.some(b => tags.includes(b));
  }

  async function init() {
    try {
      const index = await loadIndex();
      allNovels = (index.novels || []).sort((a, b) =>
        (b.lastUpdated || '').localeCompare(a.lastUpdated || '')
      );

      if (!allNovels.length) { showState('state-empty'); return; }

      updateFilterBtn();

      const totalCh = allNovels.reduce((s, n) => s + (n.totalChapters || 0), 0);
      document.getElementById('stats-bar').innerHTML =
        `<strong>${allNovels.length}</strong> novels &nbsp;·&nbsp; <strong>${totalCh.toLocaleString()}</strong> chapters`;
      document.getElementById('stats-bar').classList.remove('hidden');

      buildTagBar();
      applyFilters();
      showState('content');
    } catch (e) {
      document.getElementById('state-error').textContent = 'Could not load library. ' + e.message;
      showState('state-error');
    }
  }

  function buildTagBar() {
    const tagCount = {};
    allNovels.forEach(n => (n.tags || []).forEach(t => {
      tagCount[t] = (tagCount[t] || 0) + 1;
    }));
    const tags = Object.keys(tagCount).sort();
    if (!tags.length) return;

    const bar = document.getElementById('tag-filter-bar');
    bar.innerHTML =
      `<span class="tag-filter-label">Tags</span>` +
      tags.map(t =>
        `<span class="tag" data-tag="${esc(t)}" onclick="filterByTag('${esc(t)}')">${esc(t)}</span>`
      ).join('') +
      `<button class="tag-clear hidden" id="tag-clear" onclick="clearTag()">✕ Clear</button>`;
    bar.classList.remove('hidden');
  }

  function filterByTag(tag) {
    activeTag = activeTag === tag ? null : tag;
    document.querySelectorAll('.tag').forEach(el => {
      el.classList.toggle('active', el.dataset.tag === activeTag);
    });
    const clearBtn = document.getElementById('tag-clear');
    if (clearBtn) clearBtn.classList.toggle('hidden', !activeTag);
    applyFilters();
  }

  function clearTag() {
    activeTag = null;
    document.querySelectorAll('.tag').forEach(el => el.classList.remove('active'));
    const clearBtn = document.getElementById('tag-clear');
    if (clearBtn) clearBtn.classList.add('hidden');
    applyFilters();
  }

  function applyFilters() {
    let filtered = allNovels;
    filtered = filtered.filter(n => !isBlocked(n));
    if (activeTag)   filtered = filtered.filter(n => (n.tags || []).includes(activeTag));
    if (searchQuery) filtered = filtered.filter(n => n.title.toLowerCase().includes(searchQuery));

    const hidden = allNovels.filter(n => isBlocked(n)).length;
    const bar = document.getElementById('stats-bar');
    const totalCh = allNovels.reduce((s, n) => s + (n.totalChapters || 0), 0);
    bar.innerHTML = `<strong>${allNovels.length}</strong> novels &nbsp;·&nbsp; <strong>${totalCh.toLocaleString()}</strong> chapters`
      + (hidden && contentFilterOn ? ` &nbsp;·&nbsp; <span style="color:var(--ink-faint)">${hidden} hidden by filter</span>` : '');

    renderGrid(filtered);
  }

  function renderGrid(novels) {
    const grid = document.getElementById('novel-grid');
    if (!novels.length) {
      grid.innerHTML = `<p style="color:var(--ink-dim);font-size:.9rem;padding:24px 0">No novels match your filters.</p>`;
      return;
    }
    grid.innerHTML = novels.map(n => `
      <div class="novel-card" onclick="go('novel.html', {slug:'${esc(n.slug)}'})" role="link" tabindex="0"
           onkeydown="if(event.key==='Enter')go('novel.html',{slug:'${esc(n.slug)}'})">
        <div class="novel-card-cover">
          ${n.cover
            ? `<img src="${esc(n.cover)}" alt="${esc(n.title)}" loading="lazy" onerror="this.parentElement.innerHTML='<span class=cover-fallback>📖</span>'">`
            : `<span class="cover-fallback">📖</span>`}
        </div>
        <div class="novel-card-body">
          <div class="novel-card-title">${esc(n.title)}</div>
          ${(n.tags || []).length ? `<div class="tags" style="margin-top:6px">${n.tags.slice(0,3).map(t => `<span class="tag" style="font-size:.65rem;padding:2px 7px" onclick="event.stopPropagation();filterByTag('${esc(t)}')">${esc(t)}</span>`).join('')}</div>` : ''}
          <div class="novel-card-meta" style="margin-top:6px">
            <span class="badge badge-gold">${(n.totalChapters || 0).toLocaleString()} ch</span>
            ${n.lastUpdated ? `<br><small style="color:var(--ink-faint);font-size:.72rem">Updated ${n.lastUpdated}</small>` : ''}
          </div>
        </div>
      </div>
    `).join('');
  }

  document.getElementById('search').addEventListener('input', e => {
    searchQuery = e.target.value.toLowerCase().trim();
    applyFilters();
  });

  init();
</script>
</body>
</html>
